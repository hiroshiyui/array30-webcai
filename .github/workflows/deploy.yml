name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create release archive
        run: cd dist && zip -r ../array30-webcai-${{ github.ref_name }}.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: array30-webcai-${{ github.ref_name }}.zip
          generate_release_notes: true
