<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>行列輸入法 Web CAI</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>行列輸入法 Web CAI</h1>
        <nav>
          <ul>
            <li><a href="#lesson">課程</a></li>
            <li><a href="#practice">練習</a></li>
            <li><a href="#about">關於</a></li>
          </ul>
        </nav>
      </header>

      <main>
        <section id="lesson">
          <h2>課程</h2>
        </section>

        <section id="practice">
          <h2>練習</h2>
          <div class="practice-mode-toggle">
            <button id="mode-free" class="practice-mode-btn active">自由輸入</button>
            <button id="mode-random" class="practice-mode-btn">隨機字元</button>
            <button id="mode-article" class="practice-mode-btn">文章練習</button>
          </div>
          <div id="practice-area"></div>
          <textarea id="input-area" rows="8" placeholder="使用行列輸入法在此輸入中文…"></textarea>
        </section>
      </main>

      <footer>
        <p>行列輸入法 Web CAI</p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
